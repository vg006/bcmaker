version: "2"
run:
  tests: false
linters:
  default: none
  enable:
    - bodyclose
    - depguard
    - dogsled
    - dupl
    - errcheck
    - funlen
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - govet
    - ineffassign
    - misspell
    - nakedret
    - prealloc
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    depguard:
      rules:
        main:
          allow:
            - $gostd
            - github.com/charmbracelet
            - github.com/huandu/xstrings
            - github.com/mattn/go-runewidth
            - github.com/box-cli-maker
    goconst:
      min-len: 5
      min-occurrences: 4
    misspell:
      locale: US
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - ^examples/
formatters:
  enable:
    - gofmt
    - goimports
